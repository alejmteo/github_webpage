<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis redes</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f5f5;
        }

        h1{
            text-align:center;
            margin:40px 0;
        }

        .contenedor{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
            gap:20px;
            max-width:1000px;
            margin:auto;
            padding:20px;
        }

        .card{
            background:white;
            border-radius:12px;
            padding:30px;
            text-align:center;
            box-shadow:0 4px 12px rgba(0,0,0,.15);
            transition:.3s;
            cursor:pointer;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card h2{
            margin:0;
        }
    </style>
</head>

<body>

    <h1>Mis redes</h1>

    <div class="contenedor">

        <div class="card">
            <h2>📷 Instagram</h2>
        </div>

        <div class="card">
            <h2>🎵 Apple Music</h2>
        </div>

        <div class="card">
            <h2>🎬 Letterboxd</h2>
        </div>

        <div class="card">
            <h2>🎮 Steam</h2>
        </div>

    </div>

</body>
</html>
